services:
  hqg-platform:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        no_proxy: ${NO_PROXY:-}
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
    container_name: hqg-platform
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hqg_network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8080}/health', timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  hqg_network:
    external: true